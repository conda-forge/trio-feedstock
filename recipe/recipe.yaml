schema_version: 1

context:
  name: trio
  version: "0.33.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: a29b92b73f09d4b48ed249acd91073281a7f1063f09caba5dc70465b5c7aa970

build:
  number: 0
  skip: match(python, "<3.10")
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - setuptools >=64
  run:
    - python
    - attrs >=23.2.0
    - sortedcontainers
    - idna
    - outcome
    - sniffio >=1.3.0
    - if: win and not python_impl == 'pypy'
      then: cffi >=1.14
    - if: match(python, "<3.11")
      then: exceptiongroup

    - cffi >=1.14
tests:
  - python:
      imports:
        - trio
        - trio.testing
      pip_check: true

about:
  license: MIT
  license_file: LICENSE
  summary: An async/await-native I/O library for humans and snake people
  homepage: https://github.com/python-trio/trio
  repository: https://github.com/python-trio/trio
  documentation: https://trio.readthedocs.io/

extra:
  recipe-maintainers:
    - dhirschfeld
    - nicoddemus
    - synapticarbors
